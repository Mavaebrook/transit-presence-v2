name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build pre-populated GTFS database
        run: |
          python scripts/build_gtfs_db.py
          # Verify the file was created in the assets directory
          ls -lh app/src/main/assets/transit_prepopulated.db || echo "Database file missing!"

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Set Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Install Gradle and generate wrapper JAR
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -x lint

      - name: Extract Room Hash
        run: |
          echo "--------------------------------------------------"
          echo "SEARCHING FOR ROOM IDENTITY HASH..."
          # Locates the hash in the generated implementation file
          HASH=$(grep -r "identityHash =" . | grep "_Impl.java" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$HASH" ]; then
            echo "HASH NOT FOUND. Ensure the Room compiler (KSP/KAPT) ran successfully."
          else
            echo "YOUR_ROOM_IDENTITY_HASH: $HASH"
          fi
          echo "--------------------------------------------------"

      - uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
