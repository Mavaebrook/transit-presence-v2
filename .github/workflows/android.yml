name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Set Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Gradle wrapper JAR
        run: gradle wrapper --gradle-version 8.6

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Gradle wrapper JAR
        run: gradle wrapper --gradle-version 8.6

      - name: Run FSM unit tests
        run: ./gradlew :core:core-fsm:test --stacktrace
