name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Debug Java Environment
        run: |
          echo "=== Java Debug ==="
          echo "JAVA_HOME = $JAVA_HOME"
          echo "PATH contains java:"
          which java || echo "java NOT found in PATH"
          java -version || echo "java command failed"
          echo "=== End Java Debug ==="

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Build Debug APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
