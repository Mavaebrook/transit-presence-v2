name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build pre-populated GTFS database
        run: |
          python scripts/build_gtfs_db.py
          
          if [ -f "app/src/main/assets/transit_prepopulated.db" ]; then
            ls -lh app/src/main/assets/transit_prepopulated.db
          else
            echo "::error::Database file was not generated! Check script output."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Local Properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -x lint

      - name: Verify Build
        run: |
          echo "--------------------------------------------------"
          echo "Build Complete. Vanilla SQLite DB verified in assets."
          echo "--------------------------------------------------"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
