name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Debug environment
        run: |
          echo "=== Java Debug ==="
          which java || echo "java not in PATH"
          echo $JAVA_HOME
          java -version
          echo "=== local.properties (key redacted) ==="
          cat local.properties | sed 's/MAPS_API_KEY=.*/MAPS_API_KEY=***REDACTED***/'

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
