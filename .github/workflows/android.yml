Name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # 2026 baseline: ubuntu-latest is fine, but ensure actions are modern
    runs-on: ubuntu-latest
    steps:
      # Bumping to v5/v6 to resolve Node 20 deprecation warnings
      - uses: actions/checkout@v5 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build pre-populated GTFS database
        run: |
          # Ensure dependencies for the script are installed if needed
          # python -m pip install ... 
          python scripts/build_gtfs_db.py
          
          # VERIFICATION: This is where your previous build failed.
          # The script MUST output a .db file now, not just .sql
          if [ -f "app/src/main/assets/transit_prepopulated.db" ]; then
            ls -lh app/src/main/assets/transit_prepopulated.db
          else
            echo "::error::Database file was not generated! Build will fail."
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Set Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        # -x lint saves time; --stacktrace helps debug the GtfsRtParser error
        run: ./gradlew assembleDebug --stacktrace -x lint

      - name: Clean up and Verify
        run: |
          echo "--------------------------------------------------"
          echo "Build Complete. Vanilla SQLite DB verified in assets."
          # We removed the Room Hash step because you are avoiding Room.
          # Keeping that step would only cause "Hash Not Found" errors.
          echo "--------------------------------------------------"

      - uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
