name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build pre-populated GTFS database
        run: python scripts/build_gtfs_db.py

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Set Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Install Gradle and generate wrapper JAR
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -x lint
      - name: Expose Room Hash
        run: |
          find data/data-gtfs/build/generated -name "*AppDatabase_Impl.java" -exec grep -H "identityHash" {} +
    

      - uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
