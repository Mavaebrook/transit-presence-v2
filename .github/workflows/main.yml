name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build pre-populated GTFS database
        run: python scripts/build_gtfs_db.py

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Set Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Install Gradle and generate wrapper JAR
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -x lint

      # --- EXTRACTION START ---
      - name: Gather Room Evidence
        if: always() # Run even if the build fails
        run: |
          mkdir -p extraction_folder
          # Find the generated database
          find . -name "transit_prepopulated.db" -exec cp {} extraction_folder/ \;
          # Find any file containing 'identityHash' (usually _Impl.java or JSON)
          grep -rl "identityHash" . --include="*.java" --include="*.json" | xargs -I {} cp --parents {} extraction_folder/ || echo "No source files found"

      - name: Upload Forensic Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: room-forensics-data
          path: extraction_folder/
          retention-days: 7
      # --- EXTRACTION END ---

      - uses: actions/upload-artifact@v4
        with:
          name: transit-presence-v2-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
